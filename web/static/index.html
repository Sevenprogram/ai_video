<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI 数字人视频生成平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary: #0a0e17;
  --bg-secondary: #111827;
  --bg-tertiary: #1a2234;
  --bg-card: #151d2e;
  --border: #2a3548;
  --border-light: #3a4558;
  --text-primary: #f0f4f8;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent: #22d3ee;
  --accent-glow: rgba(34, 211, 238, 0.3);
  --accent-secondary: #a78bfa;
  --success: #34d399;
  --warning: #fbbf24;
  --error: #f87171;
  --gradient-start: #0891b2;
  --gradient-end: #7c3aed;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
  --shadow-glow: 0 0 30px var(--accent-glow);
  --font-sans: 'Noto Sans SC', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
html, body { height: 100%; }
body {
  background: var(--bg-primary);
  background-image: 
    radial-gradient(ellipse at 20% 0%, rgba(8, 145, 178, 0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(124, 58, 237, 0.1) 0%, transparent 50%);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.6;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.app {
  display: grid;
  grid-template-columns: 360px 1fr;
  grid-template-rows: 64px 1fr;
  height: 100vh;
  gap: 1px;
  background: var(--border);
}
header {
  grid-column: 1 / -1;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
}
.header-brand {
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-logo {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  box-shadow: var(--shadow-glow);
}
.header-title {
  font-size: 18px;
  font-weight: 700;
  background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.02em;
}
.header-subtitle {
  font-size: 12px;
  color: var(--text-muted);
  padding-left: 16px;
  border-left: 1px solid var(--border);
}
.header-actions {
  margin-left: auto;
  display: flex;
  gap: 12px;
}
.header-link {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 13px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.header-link:hover {
  background: var(--bg-tertiary);
  color: var(--text-primary);
}
.left-panel {
  background: var(--bg-secondary);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 20px;
  gap: 20px;
}
.panel-section {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.panel-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 8px;
}
.panel-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
textarea#prompt {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.7;
  padding: 14px 16px;
  resize: none;
  height: 180px;
  outline: none;
  transition: all 0.2s;
}
textarea#prompt:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
textarea#prompt::placeholder {
  color: var(--text-muted);
}
.input-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.input-label {
  font-size: 13px;
  color: var(--text-secondary);
}
.input-field {
  width: 80px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 13px;
  text-align: center;
  padding: 8px 12px;
  outline: none;
  transition: all 0.2s;
}
.input-field:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.checkbox-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.checkbox-item {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  transition: all 0.2s;
}
.checkbox-item:hover {
  background: var(--bg-tertiary);
}
.checkbox-item input {
  width: 18px;
  height: 18px;
  accent-color: var(--accent);
  cursor: pointer;
}
.checkbox-item span {
  font-size: 13px;
  color: var(--text-secondary);
}
.select-field {
  width: 100%;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 13px;
  padding: 10px 14px;
  outline: none;
  cursor: pointer;
  transition: all 0.2s;
}
.select-field:focus {
  border-color: var(--accent);
}
.select-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.select-label {
  font-size: 11px;
  color: var(--text-muted);
}
.btn-primary {
  background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
  color: white;
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  padding: 14px 24px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: all 0.3s;
  box-shadow: var(--shadow-glow);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px var(--accent-glow);
}
.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}
.btn-secondary {
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 12px;
  padding: 8px 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-secondary:hover {
  background: var(--border);
  color: var(--text-primary);
}
.openclaw-panel {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  display: none;
}
.openclaw-panel.visible {
  display: block;
  animation: slideDown 0.3s ease;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}
.openclaw-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.openclaw-title::before {
  content: '';
  width: 8px;
  height: 8px;
  background: var(--warning);
  border-radius: 50%;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.openclaw-btns {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.right-panel {
  background: var(--bg-secondary);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 20px;
  gap: 16px;
}
.steps-container {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
.step-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: relative;
  overflow: hidden;
  transition: all 0.3s;
}
.step-item::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--step-color, var(--border));
  transform: scaleX(0);
  transition: transform 0.4s ease;
}
.step-item.active::before {
  transform: scaleX(1);
}
.step-item.completed::before {
  transform: scaleX(1);
  background: var(--success);
}
.step-item.error::before {
  transform: scaleX(1);
  background: var(--error);
}
.step-icon {
  width: 42px;
  height: 42px;
  border-radius: 10px;
  background: var(--bg-tertiary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  transition: all 0.3s;
}
.step-item.active .step-icon {
  background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
  box-shadow: var(--shadow-glow);
}
.step-item.completed .step-icon {
  background: var(--success);
}
.step-content {
  flex: 1;
  min-width: 0;
}
.step-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 2px;
}
.step-desc {
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.main-content {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  min-height: 0;
}
.content-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-title {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}
.log-entry {
  display: flex;
  gap: 10px;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateX(-5px); }
  to { opacity: 1; transform: translateX(0); }
}
.log-time {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  flex-shrink: 0;
  width: 70px;
}
.log-tag {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 4px;
  flex-shrink: 0;
  font-weight: 500;
}
.log-tag.script { background: rgba(167, 139, 250, 0.2); color: var(--accent-secondary); }
.log-tag.storyboard { background: rgba(251, 191, 36, 0.2); color: var(--warning); }
.log-tag.openclaw { background: rgba(34, 211, 238, 0.2); color: var(--accent); }
.log-tag.pipeline { background: rgba(124, 58, 237, 0.2); color: var(--accent-secondary); }
.log-tag.done { background: rgba(52, 211, 153, 0.2); color: var(--success); }
.log-tag.error { background: rgba(248, 113, 113, 0.2); color: var(--error); }
.log-message {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-secondary);
  word-break: break-all;
}
.empty-state {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  gap: 12px;
  text-align: center;
  padding: 40px;
}
.empty-icon {
  font-size: 48px;
  opacity: 0.3;
}
.result-card {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  margin-bottom: 12px;
}
.result-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.result-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
}
.result-content {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.6;
  max-height: 120px;
  overflow-y: auto;
}
.result-content pre {
  white-space: pre-wrap;
  margin: 0;
}
.result-media {
  width: 100%;
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
}
.download-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--accent);
  text-decoration: none;
  transition: all 0.2s;
}
.download-btn:hover {
  color: var(--text-primary);
}
.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.2);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.history-section {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.history-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.history-item {
  padding: 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  border: 1px solid transparent;
  margin-bottom: 6px;
  transition: all 0.2s;
}
.history-item:hover {
  background: var(--bg-tertiary);
}
.history-item.active {
  background: rgba(34, 211, 238, 0.1);
  border-color: var(--accent);
}
.history-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 6px;
}
.history-status.pending { background: rgba(100, 116, 139, 0.2); color: var(--text-muted); }
.history-status.running { background: rgba(34, 211, 238, 0.2); color: var(--accent); }
.history-status.done { background: rgba(52, 211, 153, 0.2); color: var(--success); }
.history-status.error { background: rgba(248, 113, 113, 0.2); color: var(--error); }
.history-prompt {
  font-size: 12px;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.history-time {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 4px;
  font-family: var(--font-mono);
}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-tertiary); border-radius: 3px; }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-brand">
      <div class="header-logo">🎬</div>
      <span class="header-title">AI Video Studio</span>
      <span class="header-subtitle">智能数字人视频生成平台</span>
    </div>
    <div class="header-actions">
      <a href="/recording" class="header-link">
        <span>📹</span> 录屏先行
      </a>
    </div>
  </header>
  
  <aside class="left-panel">
    <div class="panel-section">
      <div class="panel-label">创作提示词</div>
      <textarea id="prompt" placeholder="输入视频主题或内容描述，例如：&#10;• 生成关于比特币技术分析的3分钟口播稿&#10;• 介绍 Ezpro 平台使用方法&#10;• 加密货币市场日报解读"></textarea>
    </div>
    
    <div class="panel-section">
      <div class="input-row">
        <span class="input-label">目标时长（分钟）</span>
        <input type="number" id="target-duration" class="input-field" value="3" min="1" max="30" />
      </div>
    </div>
    
    <div class="panel-section">
      <div class="input-row">
        <span class="input-label">OpenClaw 超时（秒）</span>
        <input type="number" id="openclaw-timeout" class="input-field" value="600" min="10" max="3600" />
      </div>
    </div>
    
    <div class="panel-section">
      <div class="checkbox-group">
        <label class="checkbox-item">
          <input type="checkbox" id="wait-openclaw" checked />
          <span>等待 OpenClaw 回复</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" id="use-local-videos" />
          <span>使用本地视频（跳过 OpenClaw）</span>
        </label>
      </div>
    </div>
    
    <div class="panel-section select-group" id="localVideosSection" style="display: none;">
      <div class="select-label">数字人视频（文件夹）</div>
      <select id="local-digital-human" class="select-field"></select>
      <div class="select-label">卡通头部视频</div>
      <select id="local-cartoon-head" class="select-field"></select>
      <div class="select-label">录屏视频</div>
      <select id="local-recording" class="select-field"></select>
    </div>
    
    <div class="openclaw-panel" id="openclawPanel">
      <div class="openclaw-title">等待 OpenClaw 响应</div>
      <div class="openclaw-btns">
        <button class="btn-secondary" id="skipLatest">使用最新视频</button>
        <button class="btn-secondary" id="skipFile">指定文件</button>
        <button class="btn-secondary" id="extendWait">再等 60s</button>
      </div>
    </div>
    
    <button class="btn-primary" id="btn-run">
      <span id="btn-icon">▶</span>
      <span id="btn-text">开始生成</span>
    </button>
    
    <div class="history-section">
      <div class="panel-label">历史任务</div>
      <div class="history-list" id="history-list"></div>
    </div>
  </aside>
  
  <main class="right-panel">
    <div class="steps-container">
      <div class="step-item" data-step="script">
        <div class="step-icon">📝</div>
        <div class="step-content">
          <div class="step-title">文稿 + 音频</div>
          <div class="step-desc" id="step-script-desc">等待开始</div>
        </div>
      </div>
      <div class="step-item" data-step="storyboard">
        <div class="step-icon">🎬</div>
        <div class="step-content">
          <div class="step-title">分镜生成</div>
          <div class="step-desc" id="step-storyboard-desc">等待开始</div>
        </div>
      </div>
      <div class="step-item" data-step="openclaw">
        <div class="step-icon">🖥</div>
        <div class="step-content">
          <div class="step-title">OpenClaw 录屏</div>
          <div class="step-desc" id="step-openclaw-desc">等待开始</div>
        </div>
      </div>
      <div class="step-item" data-step="pipeline">
        <div class="step-icon">🎞</div>
        <div class="step-content">
          <div class="step-title">视频合成</div>
          <div class="step-desc" id="step-pipeline-desc">等待开始</div>
        </div>
      </div>
    </div>
    
    <div class="main-content">
      <div class="content-panel">
        <div class="panel-title">
          <span>实时日志</span>
          <span id="log-spinner" style="display:none"><span class="spinner"></span></span>
        </div>
        <div class="panel-body" id="log-body">
          <div class="empty-state">
            <div class="empty-icon">📋</div>
            <p>启动工作流后，实时日志将在这里显示</p>
          </div>
        </div>
      </div>
      
      <div class="content-panel">
        <div class="panel-title">产物预览</div>
        <div class="panel-body" id="results-body">
          <div class="empty-state">
            <div class="empty-icon">🎁</div>
            <p>工作流完成后，产物将在这里展示</p>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
let activeJobId = null;
let evtSource = null;

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadLocalVideoSelects() {
  const useLocalVideos = document.getElementById('use-local-videos').checked;
  document.getElementById('localVideosSection').style.display = useLocalVideos ? 'flex' : 'none';
  
  try {
    const [videosRes, defaultsRes] = await Promise.all([fetch('/api/local-videos'), fetch('/api/local-video-defaults')]);
    if (!videosRes.ok || !defaultsRes.ok) return;
    const data = await videosRes.json();
    const defaults = await defaultsRes.json();
    const defaultFiles = {
      digital_human: (defaults.digital_human || '').split('/').pop() || 'jirian',
      cartoon_head: (defaults.cartoon_head || '').split('/').pop() || 'pig.mp4',
      video_shoot: (defaults.recording || '').split('/').pop() || 'template.mp4',
    };
    const config = [
      { id: 'local-digital-human', key: 'digital_human', df: defaultFiles.digital_human },
      { id: 'local-cartoon-head', key: 'cartoon_head', df: defaultFiles.cartoon_head },
      { id: 'local-recording', key: 'video_shoot', df: defaultFiles.video_shoot },
    ];
    config.forEach(({ id, key, df }) => {
      const sel = document.getElementById(id);
      if (!sel) return;
      const files = data[key] || [];
      sel.innerHTML = '<option value="">-- 不选择 --</option>' + files.map(f => '<option value="' + esc(f) + '"' + (f === df ? ' selected' : '') + '>' + esc(f) + '</option>').join('');
    });
  } catch (_) {}
}

document.getElementById('use-local-videos').addEventListener('change', loadLocalVideoSelects);

async function startJob() {
  const prompt = document.getElementById('prompt').value.trim();
  const timeout = parseInt(document.getElementById('openclaw-timeout').value, 10) || 600;
  const targetDuration = parseInt(document.getElementById('target-duration').value, 10) || 3;
  const waitOpenclaw = document.getElementById('wait-openclaw').checked;
  const useLocalVideos = document.getElementById('use-local-videos').checked;
  const localDigitalHuman = document.getElementById('local-digital-human').value.trim() || null;
  const localCartoonHead = document.getElementById('local-cartoon-head').value.trim() || null;
  const localRecording = document.getElementById('local-recording').value.trim() || null;
  
  document.getElementById('btn-run').disabled = true;
  document.getElementById('btn-icon').innerHTML = '<span class="spinner" style="border-top-color:#fff"></span>';
  document.getElementById('btn-text').textContent = '生成中...';
  resetUI();
  
  try {
    const res = await fetch('/api/jobs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prompt,
        openclaw_timeout: timeout,
        target_duration_minutes: targetDuration,
        wait_openclaw: waitOpenclaw,
        use_local_videos: useLocalVideos,
        local_digital_human: localDigitalHuman,
        local_cartoon_head: localCartoonHead,
        local_recording: localRecording,
      })
    });
    if (!res.ok) throw new Error(await res.text());
    const { job_id } = await res.json();
    selectJob(job_id);
  } catch (e) {
    appendLog({ step: 'error', msg: '创建任务失败: ' + e.message });
    document.getElementById('btn-run').disabled = false;
    document.getElementById('btn-icon').textContent = '▶';
    document.getElementById('btn-text').textContent = '开始生成';
  }
}

async function selectJob(jobId) {
  if (evtSource) { evtSource.close(); evtSource = null; }
  activeJobId = jobId;
  document.getElementById('openclawPanel').classList.remove('visible');
  document.getElementById('log-spinner').style.display = '';
  
  try {
    const res = await fetch('/api/jobs/' + jobId);
    if (!res.ok) return;
    const job = await res.json();
    ['script','storyboard','openclaw','pipeline'].forEach(s => setStepState(s, job.steps?.[s] || 'pending'));
    (job.logs || []).forEach(e => appendLog({ step: e.step || 'info', msg: e.text || e.msg }));
    
    if (job.status === 'done') {
      renderArtifacts(job);
      document.getElementById('btn-run').disabled = false;
      document.getElementById('btn-icon').textContent = '▶';
      document.getElementById('btn-text').textContent = '开始生成';
      document.getElementById('log-spinner').style.display = 'none';
    } else if (job.status === 'error') {
      document.getElementById('btn-run').disabled = false;
      document.getElementById('btn-icon').textContent = '▶';
      document.getElementById('btn-text').textContent = '开始生成';
      document.getElementById('log-spinner').style.display = 'none';
    } else {
      if (job.status === 'running') {
        document.getElementById('openclawPanel').classList.add('visible');
      }
      subscribeSSE(jobId);
    }
  } catch (_) {}
  refreshHistory();
}

function subscribeSSE(jobId) {
  evtSource = new EventSource('/api/jobs/' + jobId + '/logs');
  evtSource.onmessage = (e) => {
    const d = JSON.parse(e.data);
    appendLog({ step: d.step || 'info', msg: d.msg || d.text });
    
    if (d.step === 'script' || d.step === 'storyboard') {
      setStepState('script', d.step === 'script' ? 'active' : 'completed');
      setStepState('storyboard', d.step === 'storyboard' ? 'active' : 'completed');
      const el = document.getElementById('step-storyboard-desc');
      if (el && d.step === 'storyboard') el.textContent = (d.msg || '').slice(0, 40);
      fetch('/api/jobs/' + jobId).then(r => r.ok ? r.json() : null).then(j => { if (j && j.artifacts) renderArtifacts(j); });
    }
    
    if (d.step === 'openclaw') {
      setStepState('openclaw', 'active');
      document.getElementById('openclawPanel').classList.add('visible');
      fetch('/api/jobs/' + jobId).then(r => r.ok ? r.json() : null).then(j => { if (j && j.artifacts) renderArtifacts(j); });
    }
    
    if (d.step === 'pipeline') {
      setStepState('pipeline', d.msg && d.msg.includes('失败') ? 'pending' : 'active');
      fetch('/api/jobs/' + jobId).then(r => r.ok ? r.json() : null).then(j => { if (j && j.artifacts) renderArtifacts(j); });
    }
    
    if (/视频合成完成/.test(d.msg || '')) { setStepState('pipeline', 'completed'); fetch('/api/jobs/' + jobId).then(r => r.ok ? r.json() : null).then(j => { if (j) renderArtifacts(j); }); }
    if (/跳过视频合成|未在 video_shoot/.test(d.msg || '')) setStepState('pipeline', 'pending');
    if (/文稿已保存|音频已保存|分镜解析成功|输出目录已创建/.test(d.msg || '')) {
      fetch('/api/jobs/' + jobId).then(r => r.ok ? r.json() : null).then(j => { if (j && j.artifacts) renderArtifacts(j); });
    }
    if (/完成|OpenClaw 回复/.test(d.msg || '') || d.step === 'done') {
      setStepState('openclaw', 'completed');
      setStepState('storyboard', 'completed');
      setStepState('script', 'completed');
      fetch('/api/jobs/' + jobId).then(r => r.ok ? r.json() : null).then(j => { if (j) renderArtifacts(j); });
    }
    if (d.step === 'error') {
      evtSource.close();
      evtSource = null;
      document.getElementById('btn-run').disabled = false;
      document.getElementById('btn-icon').textContent = '▶';
      document.getElementById('btn-text').textContent = '开始生成';
      document.getElementById('log-spinner').style.display = 'none';
    }
  };
  evtSource.onerror = () => {
    evtSource.close();
    evtSource = null;
    document.getElementById('btn-run').disabled = false;
    document.getElementById('btn-icon').textContent = '▶';
    document.getElementById('btn-text').textContent = '开始生成';
    document.getElementById('log-spinner').style.display = 'none';
  };
}

function appendLog(entry) {
  const body = document.getElementById('log-body');
  const empty = body.querySelector('.empty-state');
  if (empty) empty.remove();
  
  const time = entry.ts ? new Date(entry.ts).toLocaleTimeString('zh-CN', { hour12: false }) : '';
  const step = entry.step || 'info';
  
  const div = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = `
    <span class="log-time">${time}</span>
    <span class="log-tag ${step}">${step.toUpperCase()}</span>
    <span class="log-message">${esc(entry.msg || '')}</span>
  `;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

function setStepState(step, status) {
  const card = document.querySelector('.step-item[data-step="' + step + '"]');
  if (!card) return;
  card.classList.remove('pending', 'active', 'completed', 'error');
  card.classList.add(status);
  
  const icon = card.querySelector('.step-icon');
  const icons = { pending: '○', active: '⚡', completed: '✓', error: '✕' };
  if (icon) icon.textContent = icons[status] || '○';
}

function renderArtifacts(job) {
  const body = document.getElementById('results-body');
  body.innerHTML = '';
  const a = job.artifacts || {};
  const folder = a.folder;
  
  if (!folder) {
    body.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>暂无产物</p></div>';
    return;
  }
  
  if (a.script) {
    const block = document.createElement('div');
    block.className = 'result-card';
    block.innerHTML = `
      <div class="result-header"><span class="result-title">📝 口播文稿</span></div>
      <div class="result-content"><pre>已保存 (${(a.script.length || 0)} 字符)</pre></div>
      <a class="download-btn" href="/api/files/${folder}/script.txt" download>⬇ 下载 script.txt</a>
    `;
    body.appendChild(block);
  }
  
  if (a.audio) {
    const block = document.createElement('div');
    block.className = 'result-card';
    block.innerHTML = `
      <div class="result-header"><span class="result-title">🔊 音频文件</span></div>
      <audio controls class="result-media"><source src="/api/files/${folder}/audio.mp3" type="audio/mpeg"></audio>
      <a class="download-btn" href="/api/files/${folder}/audio.mp3" download>⬇ 下载 audio.mp3</a>
    `;
    body.appendChild(block);
  }
  
  if (a.storyboard && a.shots) {
    const shots = a.shots;
    const rows = shots.map(s => `<tr><td>${s.id || '-'}</td><td>${s.start_sec || 0}s</td><td>${s.end_sec || 0}s</td><td>${esc(s.source || '-')}</td></tr>`).join('');
    const block = document.createElement('div');
    block.className = 'result-card';
    block.innerHTML = `
      <div class="result-header"><span class="result-title">🎬 分镜表 (${shots.length} 个)</span></div>
      <div class="result-content" style="max-height:150px;overflow:auto">
        <table style="width:100%;font-size:11px;border-collapse:collapse">
          <tr><th>#</th><th>开始</th><th>结束</th><th>来源</th></tr>
          ${rows}
        </table>
      </div>
      <a class="download-btn" href="/api/files/${folder}/storyboard.txt" download>⬇ 下载 storyboard.txt</a>
    `;
    body.appendChild(block);
  }
  
  if (a.recording_task) {
    fetch('/api/files/' + folder + '/recording_task.txt').then(r => r.text()).then(text => {
      const block = document.createElement('div');
      block.className = 'result-card';
      let html = `
        <div class="result-header"><span class="result-title">🖥 录屏指令</span></div>
        <div class="result-content"><pre>${esc(text).slice(0, 600)}</pre></div>
      `;
      if (a.openclaw_reply) html += `<div style="margin-top:8px;padding:10px;background:rgba(52,211,153,0.1);border-radius:6px;font-size:12px;color:var(--success)">✅ OpenClaw: ${esc(a.openclaw_reply)}</div>`;
      html += `<a class="download-btn" href="/api/files/${folder}/recording_task.txt" download>⬇ 下载 recording_task.txt</a>`;
      block.innerHTML = html;
      body.appendChild(block);
    });
  }
  
  if (a.final_video) {
    const block = document.createElement('div');
    block.className = 'result-card';
    block.innerHTML = `
      <div class="result-header"><span class="result-title">🎞 最终视频</span></div>
      <video controls class="result-media"><source src="/api/files/${folder}/final.mp4" type="video/mp4"></video>
      <a class="download-btn" href="/api/files/${folder}/final.mp4" download>⬇ 下载 final.mp4</a>
    `;
    body.appendChild(block);
  }
}

async function refreshHistory() {
  try {
    const res = await fetch('/api/jobs');
    if (!res.ok) return;
    const jobs = await res.json();
    const list = document.getElementById('history-list');
    list.innerHTML = '';
    
    if (!jobs.length) {
      list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px">暂无任务记录</div>';
      return;
    }
    
    jobs.forEach(job => {
      const el = document.createElement('div');
      el.className = 'history-item' + (job.id === activeJobId ? ' active' : '');
      el.onclick = () => selectJob(job.id);
      
      const time = new Date(job.created_at);
      const timeStr = time.toLocaleDateString('zh-CN') + ' ' + time.toLocaleTimeString('zh-CN', { hour12: false, hour: '2-digit', minute: '2-digit' });
      const statusMap = { pending: '待运行', running: '运行中', done: '已完成', error: '失败' };
      
      el.innerHTML = `
        <div class="history-status ${job.status}">${statusMap[job.status]}</div>
        <div class="history-prompt">${esc(job.prompt || '默认任务')}</div>
        <div class="history-time">${timeStr}</div>
      `;
      list.appendChild(el);
    });
  } catch (_) {}
}

function resetUI() {
  document.getElementById('log-body').innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><p>实时日志将在这里显示</p></div>';
  document.getElementById('results-body').innerHTML = '<div class="empty-state"><div class="empty-icon">🎁</div><p>工作流完成后，产物将在这里展示</p></div>';
  ['script','storyboard','openclaw','pipeline'].forEach(s => {
    setStepState(s, 'pending');
    const desc = document.getElementById('step-' + s + '-desc');
    if (desc) desc.textContent = '等待开始';
  });
}

document.getElementById('btn-run').onclick = startJob;
document.getElementById('skipLatest').onclick = async () => {
  if (!activeJobId) return;
  try {
    await fetch('/api/jobs/' + activeJobId + '/skip-openclaw', { method: 'POST' });
    appendLog({ step: 'openclaw', msg: '✓ 已选择使用最新视频继续' });
  } catch (e) { appendLog({ step: 'error', msg: '操作失败: ' + e.message }); }
};
document.getElementById('skipFile').onclick = async () => {
  if (!activeJobId) return;
  const fn = prompt('输入文件名（如 xxx.mp4）：');
  if (fn == null || !fn.trim()) return;
  try {
    await fetch('/api/jobs/' + activeJobId + '/skip-openclaw?filename=' + encodeURIComponent(fn.trim()), { method: 'POST' });
    appendLog({ step: 'openclaw', msg: '✓ 已选择文件: ' + fn.trim() });
  } catch (e) { appendLog({ step: 'error', msg: '操作失败: ' + e.message }); }
};
document.getElementById('extendWait').onclick = async () => {
  if (!activeJobId) return;
  try {
    await fetch('/api/jobs/' + activeJobId + '/extend-openclaw', { method: 'POST' });
    appendLog({ step: 'openclaw', msg: '✓ 已延长 60 秒等待' });
  } catch (e) { appendLog({ step: 'error', msg: '操作失败: ' + e.message }); }
};

document.addEventListener('DOMContentLoaded', () => {
  loadLocalVideoSelects();
  refreshHistory();
  setInterval(refreshHistory, 5000);
});
</script>
