<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI 数字人视频 - 录屏先行</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary: #0a0e17;
  --bg-secondary: #111827;
  --bg-tertiary: #1a2234;
  --bg-card: #151d2e;
  --border: #2a3548;
  --border-light: #3a4558;
  --text-primary: #f0f4f8;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent: #22d3ee;
  --accent-glow: rgba(34, 211, 238, 0.3);
  --accent-secondary: #a78bfa;
  --success: #34d399;
  --warning: #fbbf24;
  --error: #f87171;
  --gradient-start: #0891b2;
  --gradient-end: #7c3aed;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
  --shadow-glow: 0 0 30px var(--accent-glow);
  --font-sans: 'Noto Sans SC', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
html, body { height: 100%; }
body {
  background: var(--bg-primary);
  background-image: 
    radial-gradient(ellipse at 20% 0%, rgba(8, 145, 178, 0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(124, 58, 237, 0.1) 0%, transparent 50%);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.6;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.app {
  display: grid;
  grid-template-columns: 360px 1fr;
  grid-template-rows: 64px 1fr;
  height: 100vh;
  gap: 1px;
  background: var(--border);
}
header {
  grid-column: 1 / -1;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
}
.header-brand {
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-logo {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  box-shadow: var(--shadow-glow);
}
.header-title {
  font-size: 18px;
  font-weight: 700;
  background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.02em;
}
.header-subtitle {
  font-size: 12px;
  color: var(--text-muted);
  padding-left: 16px;
  border-left: 1px solid var(--border);
}
.header-link {
  margin-left: auto;
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 13px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.header-link:hover {
  background: var(--bg-tertiary);
  color: var(--text-primary);
}
.left-panel {
  background: var(--bg-secondary);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 20px;
  gap: 16px;
}
.panel-section {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.panel-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
}
.select-label {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.select-field {
  width: 100%;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 13px;
  padding: 10px 14px;
  outline: none;
  cursor: pointer;
  transition: all 0.2s;
}
.select-field:focus {
  border-color: var(--accent);
}
textarea#prompt, textarea#script-storyboard {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.7;
  padding: 14px 16px;
  resize: none;
  outline: none;
  transition: all 0.2s;
}
textarea#prompt:focus, textarea#script-storyboard:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
textarea#prompt { height: 140px; }
textarea#script-storyboard { height: 100px; }
.input-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.input-label {
  font-size: 13px;
  color: var(--text-secondary);
}
.input-field {
  width: 180px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 10px 14px;
  outline: none;
  transition: all 0.2s;
}
.input-field:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.checkbox-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.checkbox-item {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  transition: all 0.2s;
}
.checkbox-item:hover {
  background: var(--bg-tertiary);
}
.checkbox-item input {
  width: 18px;
  height: 18px;
  accent-color: var(--accent);
  cursor: pointer;
}
.checkbox-item span {
  font-size: 13px;
  color: var(--text-secondary);
}
.btn-primary {
  background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
  color: white;
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  padding: 14px 24px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: all 0.3s;
  box-shadow: var(--shadow-glow);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px var(--accent-glow);
}
.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}
.btn-secondary {
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 12px;
  padding: 8px 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-secondary:hover {
  background: var(--border);
  color: var(--text-primary);
}
.hidden { display: none !important; }
.openclaw-panel {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  animation: slideDown 0.3s ease;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}
.openclaw-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.openclaw-title::before {
  content: '';
  width: 8px;
  height: 8px;
  background: var(--warning);
  border-radius: 50%;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.openclaw-btns {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.history-section {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.history-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.history-item {
  padding: 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  border: 1px solid transparent;
  margin-bottom: 6px;
  transition: all 0.2s;
}
.history-item:hover {
  background: var(--bg-tertiary);
}
.history-item.active {
  background: rgba(34, 211, 238, 0.1);
  border-color: var(--accent);
}
.history-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 6px;
}
.history-status.pending { background: rgba(100, 116, 139, 0.2); color: var(--text-muted); }
.history-status.running { background: rgba(34, 211, 238, 0.2); color: var(--accent); }
.history-status.done { background: rgba(52, 211, 153, 0.2); color: var(--success); }
.history-status.error { background: rgba(248, 113, 113, 0.2); color: var(--error); }
.history-prompt {
  font-size: 12px;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.history-time {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 4px;
  font-family: var(--font-mono);
}
.right-panel {
  background: var(--bg-secondary);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 20px;
  gap: 16px;
}
.steps-container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
.step-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: relative;
  overflow: hidden;
  transition: all 0.3s;
}
.step-item::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--step-color, var(--border));
  transform: scaleX(0);
  transition: transform 0.4s ease;
}
.step-item.active::before {
  transform: scaleX(1);
}
.step-item.completed::before {
  transform: scaleX(1);
  background: var(--success);
}
.step-item.error::before {
  transform: scaleX(1);
  background: var(--error);
}
.step-icon {
  width: 42px;
  height: 42px;
  border-radius: 10px;
  background: var(--bg-tertiary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  transition: all 0.3s;
}
.step-item.active .step-icon {
  background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
  box-shadow: var(--shadow-glow);
}
.step-item.completed .step-icon {
  background: var(--success);
}
.step-content {
  flex: 1;
  min-width: 0;
}
.step-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 2px;
}
.step-desc {
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.main-content {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  min-height: 0;
}
.content-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-title {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}
.log-entry {
  display: flex;
  gap: 10px;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateX(-5px); }
  to { opacity: 1; transform: translateX(0); }
}
.log-time {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  flex-shrink: 0;
  width: 70px;
}
.log-tag {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 4px;
  flex-shrink: 0;
  font-weight: 500;
}
.log-tag.openclaw { background: rgba(34, 211, 238, 0.2); color: var(--accent); }
.log-tag.pipeline { background: rgba(124, 58, 237, 0.2); color: var(--accent-secondary); }
.log-tag.done { background: rgba(52, 211, 153, 0.2); color: var(--success); }
.log-tag.error { background: rgba(248, 113, 113, 0.2); color: var(--error); }
.log-message {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-secondary);
  word-break: break-all;
}
.empty-state {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  gap: 12px;
  text-align: center;
  padding: 40px;
}
.empty-icon {
  font-size: 48px;
  opacity: 0.3;
}
.result-card {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  margin-bottom: 12px;
}
.result-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.result-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
}
.result-content {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.6;
}
.result-media {
  width: 100%;
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
}
.download-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--accent);
  text-decoration: none;
  transition: all 0.2s;
}
.download-btn:hover {
  color: var(--text-primary);
}
.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.2);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-tertiary); border-radius: 3px; }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-brand">
      <div class="header-logo">📹</div>
      <span class="header-title">AI Video Studio</span>
      <span class="header-subtitle">录屏先行模式</span>
    </div>
    <a href="/" class="header-link">
      <span>🏠</span> 返回主流程
    </a>
  </header>
  
  <aside class="left-panel">
    <div class="panel-section">
      <div class="panel-label">录屏模式</div>
      <select id="mode" class="select-field">
        <option value="openclaw">OpenClaw 生成录屏指令</option>
        <option value="local">使用本地视频</option>
      </select>
    </div>
    
    <div class="panel-section" id="promptSection">
      <div class="panel-label">提示词</div>
      <textarea id="prompt" placeholder="输入自由描述，例如：请打开 coinglass.com 并录制爆仓热力图 60 秒..."></textarea>
    </div>
    
    <div class="panel-section">
      <div class="checkbox-group">
        <label class="checkbox-item">
          <input type="checkbox" id="wait-openclaw" checked />
          <span>等待 OpenClaw 回复</span>
        </label>
      </div>
    </div>
    
    <div class="panel-section">
      <div class="input-row">
        <span class="input-label">保存文件名</span>
        <input type="text" id="outputFilename" class="input-field" placeholder="recording_001.mp4" />
      </div>
    </div>
    
    <div class="panel-section">
      <div class="panel-label">本地视频选择</div>
      <div class="select-label">数字人视频（文件夹）</div>
      <select id="local-digital-human" class="select-field"></select>
      <div class="select-label">卡通头部视频</div>
      <select id="local-cartoon-head" class="select-field"></select>
      <div class="select-label">录屏视频</div>
      <select id="local-recording" class="select-field"></select>
    </div>

    <div class="panel-section">
      <div class="panel-label">TTS 音色</div>
      <div class="select-label">生成口播音频使用的音色（选择后可试听）</div>
      <select id="voice-id" class="select-field">
        <option value="">加载中...</option>
      </select>
    </div>
    
    <div class="panel-section hidden" id="scriptSourceSection">
      <div class="panel-label">口播文稿来源</div>
      <select id="script-source" class="select-field">
        <option value="ai_analyze">AI 分析视频内容生成</option>
        <option value="manual_storyboard">输入分镜内容，AI 生成</option>
        <option value="local_file">选择本地文稿文件</option>
      </select>
      <div class="hidden" id="scriptStoryboardRow">
        <textarea id="script-storyboard" placeholder="输入视频各分镜的主要内容，AI 将据此生成口播文稿..."></textarea>
      </div>
      <div class="hidden" id="scriptLocalRow">
        <select id="script-local-file" class="select-field"></select>
      </div>
    </div>
    
    <div class="openclaw-panel hidden" id="openclawPanel">
      <div class="openclaw-title">等待 OpenClaw 响应</div>
      <div class="openclaw-btns">
        <button class="btn-secondary" id="skipLatest">使用最新视频</button>
        <button class="btn-secondary" id="skipFile">指定文件</button>
        <button class="btn-secondary" id="extendWait">再等 60s</button>
      </div>
    </div>
    
    <div class="panel-section hidden" id="pipelineRow">
      <button class="btn-primary" id="btnPipeline" style="width:100%">
        <span>🎬</span> 生成最终视频
      </button>
    </div>
    
    <button class="btn-primary" id="btn-run">
      <span id="btn-icon">▶</span>
      <span id="btn-text">开始</span>
    </button>
    
    <div class="history-section">
      <div class="panel-label">历史任务</div>
      <div class="history-list" id="history-list"></div>
    </div>
  </aside>
  
  <main class="right-panel">
    <div class="steps-container">
      <div class="step-item" data-step="openclaw">
        <div class="step-icon">🖥</div>
        <div class="step-content">
          <div class="step-title">1. 录屏</div>
          <div class="step-desc" id="step-openclaw-desc">发送提示词并等待录屏完成</div>
        </div>
      </div>
      <div class="step-item" data-step="pipeline">
        <div class="step-icon">🎬</div>
        <div class="step-content">
          <div class="step-title">2. 视频合成</div>
          <div class="step-desc" id="step-pipeline-desc">AI 文稿 → TTS → 数字人+卡通头 → 画中画</div>
        </div>
      </div>
    </div>
    
    <div class="main-content">
      <div class="content-panel">
        <div class="panel-title">
          <span>实时日志</span>
          <span id="log-spinner" style="display:none"><span class="spinner"></span></span>
        </div>
        <div class="panel-body" id="log-body">
          <div class="empty-state">
            <div class="empty-icon">📋</div>
            <p>启动任务后，实时日志将在这里显示</p>
          </div>
        </div>
      </div>
      
      <div class="content-panel">
        <div class="panel-title">产物预览</div>
        <div class="panel-body" id="results-body">
          <div class="empty-state">
            <div class="empty-icon">🎁</div>
            <p>每完成一个步骤，产物将在这里展示</p>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
let activeJobId = null;
let evtSource = null;

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateMode() {
  const isLocal = document.getElementById('mode').value === 'local';
  document.getElementById('promptSection').classList.toggle('hidden', isLocal);
  document.getElementById('scriptSourceSection').classList.toggle('hidden', !isLocal);
  updateScriptSourceVisibility();
}

function updateScriptSourceVisibility() {
  const src = document.getElementById('script-source').value;
  document.getElementById('scriptStoryboardRow').classList.toggle('hidden', src !== 'manual_storyboard');
  document.getElementById('scriptLocalRow').classList.toggle('hidden', src !== 'local_file');
}

document.getElementById('mode').addEventListener('change', updateMode);
document.getElementById('script-source').addEventListener('change', updateScriptSourceVisibility);

async function loadVoiceSelect() {
  try {
    const res = await fetch('/api/elevenlabs-voices');
    if (!res.ok) return;
    const data = await res.json();
    const voices = data.voices || [];
    const defaultVoiceId = data.default_voice_id || '';
    const sel = document.getElementById('voice-id');
    if (!sel) return;
    const labelMap = {
      accent: { american: '美式', british: '英式', australian: '澳式', indian: '印式', irish: '爱尔兰', scottish: '苏格兰' },
      gender: { male: '男', female: '女', neutral: '中性' },
      age: { young: '年轻', middle_aged: '中年', old: '老年' },
      use_case: { conversational: '对话', narration: '旁白', entertainment_tv: '娱乐节目', social_media: '社交媒体', characters: '角色', advertisement: '广告', news: '新闻', podcast: '播客', audiobook: '有声书' },
      descriptive: { calm: '平静', energetic: '活力', warm: '温暖', professional: '专业', sassy: '时尚', classy: '优雅', quirky: ' quirky' }
    };
    function getLabel(key, value) {
      if (!value) return '';
      return labelMap[key]?.[value] || value;
    }
    sel.innerHTML = '<option value="">-- 默认音色 --</option>' + voices.map(v => {
      const labels = v.labels || {};
      const tags = [];
      if (labels.gender) tags.push(getLabel('gender', labels.gender));
      if (labels.accent) tags.push(getLabel('accent', labels.accent));
      if (labels.age) tags.push(getLabel('age', labels.age));
      const tagStr = tags.length > 0 ? ' [' + tags.join(' · ') + ']' : '';
      const selected = v.voice_id === defaultVoiceId ? ' selected' : '';
      return '<option value="' + esc(v.voice_id) + '"' + selected + ' data-preview="' + esc(v.preview_url || '') + '">' + esc(v.name) + tagStr + '</option>';
    }).join('');
    sel.addEventListener('change', function() {
      const previewUrl = this.options[this.selectedIndex]?.dataset?.preview;
      if (previewUrl) {
        const audio = new Audio(previewUrl);
        audio.play().catch(() => {});
      }
    });
  } catch (_) {}
}

async function loadLocalVideoSelects() {
  try {
    const [videosRes, defaultsRes, scriptsRes] = await Promise.all([
      fetch('/api/local-videos'),
      fetch('/api/local-video-defaults'),
      fetch('/api/recording/spoken-scripts'),
    ]);
    if (!videosRes.ok || !defaultsRes.ok) return;
    const data = await videosRes.json();
    const defaults = await defaultsRes.json();
    const defaultFiles = {
      digital_human: (defaults.digital_human || '').split('/').pop() || 'jirian',
      cartoon_head: (defaults.cartoon_head || '').split('/').pop() || 'pig.mp4',
      video_shoot: (defaults.recording || '').split('/').pop() || 'template.mp4',
    };
    const config = [
      { id: 'local-digital-human', key: 'digital_human', df: defaultFiles.digital_human },
      { id: 'local-cartoon-head', key: 'cartoon_head', df: defaultFiles.cartoon_head },
      { id: 'local-recording', key: 'video_shoot', df: defaultFiles.video_shoot },
    ];
    config.forEach(({ id, key, df }) => {
      const sel = document.getElementById(id);
      if (!sel) return;
      const files = data[key] || [];
      sel.innerHTML = '<option value="">-- 不选择 --</option>' + files.map(f => '<option value="' + esc(f) + '"' + (f === df ? ' selected' : '') + '>' + esc(f) + '</option>').join('');
    });
    const scriptSel = document.getElementById('script-local-file');
    if (scriptSel && scriptsRes.ok) {
      const scripts = await scriptsRes.json();
      scriptSel.innerHTML = '<option value="">-- 选择文件 --</option>' + (scripts || []).map(f => '<option value="' + esc(f) + '">' + esc(f) + '</option>').join('');
    }
    updateMode();
  } catch (_) {}
}

async function startJob() {
  const mode = document.getElementById('mode').value;
  const useLocalVideos = mode === 'local';
  const prompt = document.getElementById('prompt').value.trim();
  const outputFilename = document.getElementById('outputFilename').value.trim() || undefined;
  const waitOpenclaw = document.getElementById('wait-openclaw').checked;
  const localDigitalHuman = document.getElementById('local-digital-human').value.trim() || null;
  const localCartoonHead = document.getElementById('local-cartoon-head').value.trim() || null;
  const localRecording = document.getElementById('local-recording').value.trim() || null;
  const scriptSource = document.getElementById('script-source').value || 'manual_storyboard';
  const scriptStoryboard = document.getElementById('script-storyboard').value.trim() || null;
  const scriptLocalFile = document.getElementById('script-local-file').value.trim() || null;
  const voiceId = document.getElementById('voice-id').value.trim() || null;

  if (!useLocalVideos && !prompt && !localRecording) {
    alert('请输入提示词，或选择录屏视频');
    return;
  }
  if (useLocalVideos && localRecording) {
    if (scriptSource === 'manual_storyboard' && !scriptStoryboard) {
      alert('请输入分镜主要内容');
      return;
    }
    if (scriptSource === 'local_file' && !scriptLocalFile) {
      alert('请选择本地文稿文件');
      return;
    }
  }
  
  document.getElementById('btn-run').disabled = true;
  document.getElementById('btn-icon').innerHTML = '<span class="spinner" style="border-top-color:#fff"></span>';
  document.getElementById('btn-text').textContent = '运行中...';
  resetUI();
  
  try {
    const res = await fetch('/api/recording/jobs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prompt: useLocalVideos ? (scriptSource === 'manual_storyboard' ? scriptStoryboard : null) : prompt,
        output_filename: outputFilename,
        wait_openclaw: waitOpenclaw,
        use_local_videos: useLocalVideos,
        local_digital_human: localDigitalHuman,
        local_cartoon_head: localCartoonHead,
        local_recording: localRecording,
        script_source: useLocalVideos ? scriptSource : 'manual_storyboard',
        script_storyboard: useLocalVideos ? scriptStoryboard : null,
        script_local_file: useLocalVideos ? scriptLocalFile : null,
        voice_id: voiceId,
      })
    });
    if (!res.ok) throw new Error(await res.text());
    const { job_id } = await res.json();
    selectJob(job_id);
  } catch (e) {
    appendLog({ step: 'error', msg: '创建任务失败: ' + e.message });
    document.getElementById('btn-run').disabled = false;
    document.getElementById('btn-icon').textContent = '▶';
    document.getElementById('btn-text').textContent = '开始';
  }
}

async function selectJob(jobId) {
  if (evtSource) { evtSource.close(); evtSource = null; }
  activeJobId = jobId;
  document.getElementById('openclawPanel').classList.add('hidden');
  document.getElementById('log-spinner').style.display = '';
  
  try {
    const res = await fetch('/api/recording/jobs/' + jobId);
    if (!res.ok) return;
    const job = await res.json();
    setStepState('openclaw', job.status === 'done' ? 'completed' : job.status === 'error' ? 'error' : job.status === 'running' ? 'active' : 'pending');
    setStepState('pipeline', (job.pipeline_status === 'done' ? 'completed' : job.pipeline_status === 'error' ? 'error' : job.pipeline_status === 'running' ? 'active' : 'pending'));
    (job.logs || []).forEach(e => appendLog({ step: e.step || 'info', msg: e.text || e.msg, ts: e.ts }));
    renderResults(job);
    if (job.status === 'done' || job.status === 'error') {
      document.getElementById('btn-run').disabled = false;
      document.getElementById('btn-icon').textContent = '▶';
      document.getElementById('btn-text').textContent = '开始';
      document.getElementById('log-spinner').style.display = 'none';
      if (job.status === 'done' && job.pipeline_status !== 'running' && job.pipeline_status !== 'done') {
        document.getElementById('pipelineRow').classList.remove('hidden');
      }
    } else {
      subscribeSSE(jobId);
    }
  } catch (_) {}
  refreshHistory();
}

function subscribeSSE(jobId) {
  evtSource = new EventSource('/api/recording/jobs/' + jobId + '/logs');
  evtSource.onmessage = (e) => {
    const d = JSON.parse(e.data);
    const text = d.text || '';
    appendLog({ step: d.step || 'info', msg: text, ts: d.ts });
    
    if (/发送给 OpenClaw|AI 正在|录屏先行/.test(text)) {
      setStepState('openclaw', 'active');
      document.getElementById('openclawPanel').classList.remove('hidden');
    }
    if (/回复：|完成|用户选择|跳过等待/.test(text)) {
      setStepState('openclaw', 'completed');
      document.getElementById('pipelineRow').classList.remove('hidden');
      fetch('/api/recording/jobs/' + jobId).then(r => r.ok ? r.json() : null).then(j => { if (j) renderResults(j); });
    }
    if (/\[script\]|\[audio\]|\[pipeline\]/.test(text)) {
      setStepState('pipeline', 'active');
    }
    if (/视频合成完成/.test(text)) {
      setStepState('pipeline', 'completed');
      document.getElementById('pipelineRow').classList.add('hidden');
      fetch('/api/recording/jobs/' + jobId).then(r => r.ok ? r.json() : null).then(j => { if (j) renderResults(j); });
    }
    if (/错误/.test(text)) {
      setStepState('openclaw', 'error');
      evtSource.close();
      evtSource = null;
      document.getElementById('btn-run').disabled = false;
      document.getElementById('btn-icon').textContent = '▶';
      document.getElementById('btn-text').textContent = '开始';
      document.getElementById('log-spinner').style.display = 'none';
    }
  };
  evtSource.onerror = () => {
    evtSource.close();
    evtSource = null;
    document.getElementById('btn-run').disabled = false;
    document.getElementById('btn-icon').textContent = '▶';
    document.getElementById('btn-text').textContent = '开始';
    document.getElementById('log-spinner').style.display = 'none';
  };
}

function appendLog(entry) {
  const body = document.getElementById('log-body');
  const empty = body.querySelector('.empty-state');
  if (empty) empty.remove();
  
  const time = entry.ts ? new Date(entry.ts).toLocaleTimeString('zh-CN', { hour12: false }) : '';
  const step = entry.msg && /错误/.test(entry.msg) ? 'error' : (entry.step || 'info');
  
  const div = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = `
    <span class="log-time">${time}</span>
    <span class="log-tag ${step}">${step.toUpperCase()}</span>
    <span class="log-message">${esc(entry.msg || '')}</span>
  `;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

function setStepState(step, status) {
  const card = document.querySelector('.step-item[data-step="' + step + '"]');
  if (!card) return;
  card.classList.remove('pending', 'active', 'completed', 'error');
  card.classList.add(status);
  
  const icon = card.querySelector('.step-icon');
  const icons = { pending: '○', active: '⚡', completed: '✓', error: '✕' };
  if (icon) icon.textContent = icons[status] || '○';
}

function renderResults(job) {
  const body = document.getElementById('results-body');
  const empty = body.querySelector('.empty-state');
  if (empty) empty.remove();
  body.innerHTML = '';

  if (job.status === 'completed') {
    const b = document.createElement('div');
    b.className = 'result-card';
    b.innerHTML = `
      <div class="result-header"><span class="result-title">🖥 录屏</span></div>
      <div class="result-content">录屏已完成</div>
    `;
    body.appendChild(b);
  }

  const pa = job.pipeline_artifacts || {};
  const folder = job.pipeline_folder || pa.folder || '';

  if (folder && (pa.script || pa.run_dir)) {
    const block = document.createElement('div');
    block.className = 'result-card';
    block.innerHTML = `
      <div class="result-header"><span class="result-title">📝 口播文稿</span></div>
      <a class="download-btn" href="/api/files/${esc(folder)}/script.txt" download>⬇ 下载 script.txt</a>
    `;
    body.appendChild(block);
  }
  if (folder && (pa.audio || pa.run_dir)) {
    const block = document.createElement('div');
    block.className = 'result-card';
    block.innerHTML = `
      <div class="result-header"><span class="result-title">🔊 音频</span></div>
      <audio controls class="result-media"><source src="/api/files/${esc(folder)}/audio.mp3" type="audio/mpeg"></audio>
      <a class="download-btn" href="/api/files/${esc(folder)}/audio.mp3" download>⬇ 下载 audio.mp3</a>
    `;
    body.appendChild(block);
  }
  if (job.final_video) {
    const block = document.createElement('div');
    block.className = 'result-card';
    const fn = (job.final_video || '').split('/').pop() || 'final.mp4';
    block.innerHTML = `
      <div class="result-header"><span class="result-title">🎞 最终视频</span></div>
      <video controls class="result-media"><source src="/api/recording/output/${encodeURIComponent(fn)}" type="video/mp4"></video>
      <a class="download-btn" href="/api/recording/output/${encodeURIComponent(fn)}" download>⬇ 下载 ${esc(fn)}</a>
    `;
    body.appendChild(block);
  }
}

async function refreshHistory() {
  try {
    const res = await fetch('/api/recording/jobs');
    if (!res.ok) return;
    const jobs = await res.json();
    const list = document.getElementById('history-list');
    list.innerHTML = '';
    
    if (!jobs.length) {
      list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px">暂无任务记录</div>';
      return;
    }
    
    jobs.forEach(job => {
      const el = document.createElement('div');
      el.className = 'history-item' + (job.id === activeJobId ? ' active' : '');
      el.onclick = () => selectJob(job.id);
      
      const time = new Date(job.created_at);
      const timeStr = time.toLocaleDateString('zh-CN') + ' ' + time.toLocaleTimeString('zh-CN', { hour12: false, hour: '2-digit', minute: '2-digit' });
      const statusMap = { pending: '待运行', running: '运行中', done: '已完成', error: '失败' };
      
      el.innerHTML = `
        <div class="history-status ${job.status}">${statusMap[job.status]}</div>
        <div class="history-prompt">${esc(job.prompt || '默认任务')}</div>
        <div class="history-time">${timeStr}</div>
      `;
      list.appendChild(el);
    });
  } catch (_) {}
}

function resetUI() {
  document.getElementById('log-body').innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><p>实时日志将在这里显示</p></div>';
  document.getElementById('results-body').innerHTML = '<div class="empty-state"><div class="empty-icon">🎁</div><p>产物将在这里展示</p></div>';
  setStepState('openclaw', 'pending');
  setStepState('pipeline', 'pending');
  document.getElementById('pipelineRow').classList.add('hidden');
  document.getElementById('openclawPanel').classList.add('hidden');
}

document.getElementById('btn-run').onclick = startJob;
document.getElementById('skipLatest').onclick = async () => {
  if (!activeJobId) return;
  try {
    await fetch('/api/recording/jobs/' + activeJobId + '/skip-openclaw', { method: 'POST' });
    appendLog({ step: 'openclaw', msg: '✓ 已选择使用最新视频继续' });
  } catch (e) { appendLog({ step: 'error', msg: '操作失败: ' + e.message }); }
};
document.getElementById('skipFile').onclick = async () => {
  if (!activeJobId) return;
  const fn = prompt('输入文件名（如 xxx.mp4）：');
  if (fn == null || !fn.trim()) return;
  try {
    await fetch('/api/recording/jobs/' + activeJobId + '/skip-openclaw?filename=' + encodeURIComponent(fn.trim()), { method: 'POST' });
    appendLog({ step: 'openclaw', msg: '✓ 已选择文件: ' + fn.trim() });
  } catch (e) { appendLog({ step: 'error', msg: '操作失败: ' + e.message }); }
};
document.getElementById('extendWait').onclick = async () => {
  if (!activeJobId) return;
  try {
    await fetch('/api/recording/jobs/' + activeJobId + '/extend-openclaw', { method: 'POST' });
    appendLog({ step: 'openclaw', msg: '✓ 已延长 60 秒等待' });
  } catch (e) { appendLog({ step: 'error', msg: '操作失败: ' + e.message }); }
};
document.getElementById('btnPipeline').onclick = async () => {
  if (!activeJobId) return;
  const btn = document.getElementById('btnPipeline');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 合成中...';
  try {
    const res = await fetch('/api/recording/jobs/' + activeJobId + '/run-pipeline', { method: 'POST' });
    if (!res.ok) throw new Error(await res.text());
    appendLog({ step: 'info', msg: '已开始视频合成流程' });
    subscribeSSE(activeJobId);
    const poll = () => {
      fetch('/api/recording/jobs/' + activeJobId).then(r => r.ok ? r.json() : null).then(j => {
        if (!j) return;
        if (j.pipeline_status === 'done') {
          setStepState('pipeline', 'completed');
          renderResults(j);
          btn.disabled = false;
          btn.innerHTML = '<span>🎬</span> 生成最终视频';
          document.getElementById('pipelineRow').classList.add('hidden');
          return;
        }
        if (j.pipeline_status === 'error') {
          btn.disabled = false;
          btn.innerHTML = '<span>🎬</span> 生成最终视频';
          return;
        }
        setTimeout(poll, 3000);
      });
    };
    setTimeout(poll, 3000);
  } catch (e) {
    appendLog({ step: 'error', msg: '启动合成失败: ' + e.message });
    btn.disabled = false;
    btn.innerHTML = '<span>🎬</span> 生成最终视频';
  }
};

document.addEventListener('DOMContentLoaded', () => {
  loadLocalVideoSelects();
  loadVoiceSelect();
  refreshHistory();
  setInterval(refreshHistory, 5000);
});
</script>
